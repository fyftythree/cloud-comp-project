<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Progression</title>
</head>



<body>

<button onclick="goDashboard()">Back To Dashboard</button>

<h1>{{ progression[1] }}</h1>

<h3>Chords</h3>

<ul>
{% for chord in chords %}
    <li>
        <button onclick='displayChord({{ chord["notes"]|tojson }})'>
            {{ chord["name"] }}{{ chord["type"] }}
        </button>
    </li>
{% endfor %}
</ul>

<!-- shared piano display -->
{% include "piano_roll.html" %}

<script>
    function displayChord(notes) {

        document.querySelectorAll(".note").forEach(note => {
            note.classList.remove("active");
        });

        notes.forEach(n => {
            let element = document.querySelector(`[data-note="${n}"]`);

            if (element) {
                element.classList.add("active");
            }
        });
    }
    function goDashboard() {
        window.location.href = "/dashboard";
    }
</script>

</body>
</html>
