<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta charset="UTF-8">
    <title>Chordloid</title>
</head>
<body>

<div class="container">

    <div style="display:flex; justify-content:space-between;">
        <h1>Chordloid</h1>

        <form action="/logout" method="get">
            <button>Logout</button>
        </form>
    </div>


    <label>Chord Name:</label>
    <input id="name" type="text" placeholder="C">

    <label>Chord Type:</label>
    <input id="type" type="text" placeholder="major">

    <button onclick="getChord()">Get Notes</button>

    <h2 id="result"></h2>

</div>
<script>
    function getChord(){

        console.log("Button clicked");
        let name = document.getElementById("name").value;
        let type = document.getElementById("type").value;

        fetch(`http://127.0.0.1:5000/api/chord?name=${name}&type=${type}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById("result").innerText =
                    "Notes: " + data.notes.join(", ");
            });
    }
</script>

</body>
</html>
